<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CTA Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0f1e; font-family: 'Heebo', 'Segoe UI', Arial, sans-serif; direction: rtl; overflow: hidden; }
  .slide { width: 100%; height: 100dvh; position: relative; overflow: hidden; }
  .slide img.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .text-section { position: absolute; top: 0; left: 0; right: 0; z-index: 2; padding: 52px 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
  .question { color: #f1f5ff; font-size: 26px; font-weight: 900; line-height: 1.45; letter-spacing: -0.3px; }
  .question em { font-style: normal; color: #f97316; }
  .divider { width: 48px; height: 4px; background: #1dd38a; border-radius: 4px; }
  .statement { color: #cbd5e1; font-size: 18px; font-weight: 600; line-height: 1.55; }
  .statement strong { color: #1dd38a; font-weight: 800; }
</style>
</head>
<body>
<div class="slide">
  <img class="bg" src="slides/SMARTOPENER UTILITY.jpeg" alt="">
  <div class="text-section">
    <h2 class="question">
      עדיין נותנים לכל עובד<br>
      <em>גישה חופשית</em><br>
      להגדרות העמדה שלכם?
    </h2>
    <div class="divider"></div>
    <p class="statement">
      הגיע הזמן להפריד בין<br>
      <strong>תפעול שטח</strong> לניהול מערכת.
    </p>
  </div>
</div>
</body>
</html>
