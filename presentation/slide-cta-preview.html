<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>תצוגה מקדימה — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0f1e;
    font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
    direction: rtl;
    overflow: hidden;
  }

  .slide {
    width: 100%;
    height: 100dvh;
    background: #0a0f1e;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── Text block ── */
  .text-section {
    position: relative;
    z-index: 2;
    padding: 52px 28px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .question {
    color: #f1f5ff;
    font-size: 24px;
    font-weight: 900;
    line-height: 1.5;
    letter-spacing: -0.3px;
  }
  .question em {
    font-style: normal;
    color: #f97316;
  }

  .divider {
    width: 48px; height: 4px;
    background: #1dd38a;
    border-radius: 4px;
  }

  .statement {
    color: #94a3b8;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.55;
  }
  .statement strong {
    color: #1dd38a;
    font-weight: 800;
  }

  /* ── Cutout image — anchored to bottom ── */
  .img-section {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .img-section img {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="text-section">
    <h2 class="question">
      עדיין נותנים לכל עובד<br>
      <em>גישה חופשית</em><br>
      להגדרות העמדה שלכם?
    </h2>
    <div class="divider"></div>
    <p class="statement">
      הגיע הזמן להפריד בין<br>
      <strong>תפעול שטח</strong> לניהול מערכת.
    </p>
  </div>

  <div class="img-section">
    <img src="slides/cta-cutout.png" alt="">
  </div>

</div>
</body>
</html>
